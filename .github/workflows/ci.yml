name: CI

on:
  push:
    branches: [ main ]        
  pull_request:
    branches: [ main ]        
    
jobs:
  test:                       
    runs-on: ubuntu-latest    

    steps:
      - name: Get Code
        uses: actions/checkout@v5

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Package
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Tests
        run: dotnet test --no-build
